<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helm</title>
  <style>
    body { background:#0B1020; color:#D7E3FF; font-family: ui-sans-serif, system-ui, -apple-system; }
    .panel { background:#11172B; border:1px solid #1B2440; padding:16px; margin:12px; border-radius:8px; }
    label { display:block; margin-top:8px; }
    input { width:100%; background:#0F162A; color:#D7E3FF; border:1px solid #1B2440; padding:8px; }
    button { margin-top:12px; padding:8px 12px; background:#26406E; border:none; color:#D7E3FF; border-radius:6px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .col { flex:1; min-width:260px; }
    .pill { padding:4px 8px; border-radius:12px; background:#0F162A; border:1px solid #1B2440; }
    svg { width:100%; height:220px; }
    #dbWrap { width: 30px; height: 160px; border:1px solid #1B2440; background:#0B1020; position: relative; border-radius:4px; }
    #dbFill { position:absolute; bottom:0; left:0; right:0; background: linear-gradient(180deg, #8DEB8D 0%, #FACC15 60%, #EF4444 100%); }
    #dbPeak { position:absolute; left:0; right:0; height:3px; background:#FF6B6B; box-shadow:0 0 6px rgba(255,107,107,0.8); }
    .damage-led { width:12px; height:12px; border-radius:50%; display:inline-block; margin-left:8px; border:2px solid #333; }
    .damage-led.flashing { animation: flash 1s infinite; }
    .damage-led.hull-damage { background:#FF6B6B; }
    .damage-led.flooding { background:#4A90E2; }
    .damage-led.normal { background:#8BE28B; }
    @keyframes flash { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Helm <span class="pill" id="wsStatusTitle" title="WebSocket connection status" style="margin-left: 8px; font-size: 14px; font-weight: normal;">WebSocket: Connecting...</span></h2>
    <div class="row">
      <div class="col">
        <svg id="hdgDial" viewBox="0 0 300 300" title="Heading dial (drag to set)"></svg>
        <div class="row">
          <div class="pill" id="cav" title="Cavitation increases detectability and noise">Cavitation: NO</div>
          <div class="pill" id="therm" title="Thermocline may attenuate sound; affects detection">Thermocline: ON</div>
          <div class="pill">Damage: <span id="hullDamage" class="damage-led normal" title="Hull Damage"></span><span id="flooding" class="damage-led normal" title="Flooding"></span></div>
        </div>
      </div>
      <div class="col">
        <svg id="depthLadder" viewBox="0 0 120 300" title="Depth ladder"></svg>
      </div>
      <div class="col">
        <svg id="speedTele" viewBox="0 0 120 300" title="Speed telegraph"></svg>
      </div>
      <div class="col">
        <div class="pill">Helm Noise: <span id="helmNoise">0</span> dB</div>
        <div id="dbWrap" title="Helm noise">
          <div id="dbFill" style="height:0px;"></div>
          <div id="dbPeak" style="bottom:0px;"></div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col"><label title="Ordered heading in degrees (0=North)">Heading (deg)<input id="heading" type="number" min="0" max="359" value="270"></label></div>
      <div class="col"><label title="Ordered speed in knots">Speed (kn)<input id="speed" type="number" min="0" max="30" value="8"></label></div>
      <div class="col"><label title="Ordered keel depth in meters">Depth (m)<input id="depth" type="number" min="0" max="600" value="100"></label></div>
    </div>
    <button id="send" title="Send helm order to the sim loop">Order</button>
    <div class="panel" style="width:100%;">
      <h3>Maintenance</h3>
      <div class="row" id="tasksRow">
        <div class="pill" id="task" title="Current maintenance tasks">No Active Tasks</div>
      </div>
    </div>
    <pre id="telemetry" title="Ownship state and events"></pre>
  </div>
  <script>
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/helm');
    
    // WebSocket connection debugging
    const wsStatusTitle = document.getElementById('wsStatusTitle');
    
    ws.onopen = () => {
        console.log('🔌 WebSocket connected to helm station');
        wsStatusTitle.textContent = 'WebSocket: Connected';
        wsStatusTitle.style.color = '#8DEB8D';
        wsStatusTitle.style.borderColor = '#8DEB8D';
    };
    
    ws.onclose = () => {
        console.log('🔌 WebSocket connection closed');
        wsStatusTitle.textContent = 'WebSocket: Disconnected';
        wsStatusTitle.style.color = '#FF6B6B';
        wsStatusTitle.style.borderColor = '#FF6B6B';
    };
    
    ws.onerror = (error) => {
        console.error('❌ WebSocket error:', error);
        wsStatusTitle.textContent = 'WebSocket: Error';
        wsStatusTitle.style.color = '#FF6B6B';
        wsStatusTitle.style.borderColor = '#FF6B6B';
    };
    const tel = document.getElementById('telemetry');
    const cav = document.getElementById('cav');
    const therm = document.getElementById('therm');
    const hdgDial = document.getElementById('hdgDial');
    const depthLadder = document.getElementById('depthLadder');
    const speedTele = document.getElementById('speedTele');
    const helmNoise = document.getElementById('helmNoise');
    const dbWrap = document.getElementById('dbWrap');
    const dbFill = document.getElementById('dbFill');
    const dbPeak = document.getElementById('dbPeak');
    let peakHold = 0;
    function setDbMeter(db){
      const h = dbWrap.clientHeight || 160;
      const clamped = Math.max(0, Math.min(100, db));
      const px = Math.floor((clamped/100)*h);
      dbFill.style.height = px + 'px';
      peakHold = Math.max(peakHold - 1, px);
      dbPeak.style.bottom = (peakHold-2) + 'px';
    }

    function drawDial(svg, hdg, ordered){
      svg.innerHTML = '';
      const NS = 'http://www.w3.org/2000/svg';
      const r = 120, cx = 150, cy = 150;
      const circle = document.createElementNS(NS, 'circle');
      circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
      circle.setAttribute('fill', '#0F162A'); circle.setAttribute('stroke', '#1B2440');
      svg.appendChild(circle);
      // Ticks every 30°, majors every 90°
      for (let a=0;a<360;a+=30){
        const ang = (a-90) * Math.PI/180; const len = (a%90===0)?16:8; const col = (a%90===0)?'#6E84C8':'#3A4674';
        const x1 = cx + Math.cos(ang)*(r-10), y1 = cy + Math.sin(ang)*(r-10);
        const x2 = cx + Math.cos(ang)*(r-10-len), y2 = cy + Math.sin(ang)*(r-10-len);
        const line = document.createElementNS(NS,'line');
        line.setAttribute('x1',x1); line.setAttribute('y1',y1); line.setAttribute('x2',x2); line.setAttribute('y2',y2);
        line.setAttribute('stroke', col); svg.appendChild(line);
        if (a%90===0){ const t = document.createElementNS(NS,'text'); t.setAttribute('x', cx + Math.cos(ang)*(r-34)); t.setAttribute('y', cy + Math.sin(ang)*(r-34)); t.setAttribute('fill','#89B4FA'); t.setAttribute('font-size','12'); t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle'); t.textContent = String(a); svg.appendChild(t);}      }
      // Actual heading bug - triangle pointing outward
      const bugA = (hdg-90)*Math.PI/180;
      const bugR = r - 24;
      const bugX = cx + Math.cos(bugA)*bugR;
      const bugY = cy + Math.sin(bugA)*bugR;
      // Triangle points: tip toward edge, base toward center
      const tipX = cx + Math.cos(bugA)*(bugR+10);
      const tipY = cy + Math.sin(bugA)*(bugR+10);
      const baseL = bugA + Math.PI/2;
      const baseR = bugA - Math.PI/2;
      const b1X = cx + Math.cos(bugA)*(bugR-6) + Math.cos(baseL)*5;
      const b1Y = cy + Math.sin(bugA)*(bugR-6) + Math.sin(baseL)*5;
      const b2X = cx + Math.cos(bugA)*(bugR-6) + Math.cos(baseR)*5;
      const b2Y = cy + Math.sin(bugA)*(bugR-6) + Math.sin(baseR)*5;
      const tri = document.createElementNS(NS,'polygon');
      tri.setAttribute('points', `${tipX},${tipY} ${b1X},${b1Y} ${b2X},${b2Y}`);
      tri.setAttribute('fill','#6EE7A7');
      svg.appendChild(tri);
      // Ordered heading bug - small dot
      const obA = (ordered-90)*Math.PI/180; const obX = cx + Math.cos(obA)*(r-12); const obY = cy + Math.sin(obA)*(r-12);
      const ob = document.createElementNS(NS,'circle'); ob.setAttribute('cx',obX); ob.setAttribute('cy',obY); ob.setAttribute('r','4'); ob.setAttribute('fill','#EAB308'); svg.appendChild(ob);
    }

    function drawLadder(svg, depth, ordered){
      svg.innerHTML = '';
      const NS='http://www.w3.org/2000/svg';
      const w=120,h=300; const max=600; const scale = h/max;
      const bg = document.createElementNS(NS,'rect'); bg.setAttribute('x',0); bg.setAttribute('y',0); bg.setAttribute('width',w); bg.setAttribute('height',h); bg.setAttribute('fill','#0F162A'); bg.setAttribute('stroke','#1B2440'); svg.appendChild(bg);
      for (let d=0; d<=max; d+=50){
        const y = h - d*scale; const major = (d%100===0);
        const line = document.createElementNS(NS,'line'); line.setAttribute('x1',10); line.setAttribute('x2', major?90:60); line.setAttribute('y1',y); line.setAttribute('y2',y); line.setAttribute('stroke', major?'#6E84C8':'#3A4674'); svg.appendChild(line);
        if (major){ const t=document.createElementNS(NS,'text'); t.setAttribute('x', 100); t.setAttribute('y', y); t.setAttribute('fill','#89B4FA'); t.setAttribute('font-size','12'); t.textContent=String(d); svg.appendChild(t);}      }
      // Actual marker - triangle pointing right
      const ay = h - depth*scale;
      const tri = document.createElementNS(NS,'polygon');
      tri.setAttribute('points', `2,${ay-6} 2,${ay+6} 14,${ay}`);
      tri.setAttribute('fill','#6EE7A7');
      svg.appendChild(tri);
      // Ordered marker - small dot
      const oy = h - ordered*scale;
      const dot = document.createElementNS(NS,'circle');
      dot.setAttribute('cx', 8); dot.setAttribute('cy', oy); dot.setAttribute('r', 4);
      dot.setAttribute('fill','#EAB308');
      svg.appendChild(dot);
    }

    function drawTele(svg, speed, ordered){
      svg.innerHTML='';
      const NS='http://www.w3.org/2000/svg'; const w=120,h=300; const max=30; const scale = h/max;
      const bg = document.createElementNS(NS,'rect'); bg.setAttribute('x',0); bg.setAttribute('y',0); bg.setAttribute('width',w); bg.setAttribute('height',h); bg.setAttribute('fill','#0F162A'); bg.setAttribute('stroke','#1B2440'); svg.appendChild(bg);
      for (let s=0; s<=max; s+=5){ const y=h - s*scale; const line=document.createElementNS(NS,'line'); line.setAttribute('x1',10); line.setAttribute('x2',80); line.setAttribute('y1',y); line.setAttribute('y2',y); line.setAttribute('stroke','#3A4674'); svg.appendChild(line); const t=document.createElementNS(NS,'text'); t.setAttribute('x',90); t.setAttribute('y',y); t.setAttribute('fill','#89B4FA'); t.setAttribute('font-size','12'); t.textContent=String(s); svg.appendChild(t);}
      // Actual marker - triangle pointing right
      const ay = h - speed*scale;
      const tri = document.createElementNS(NS,'polygon');
      tri.setAttribute('points', `2,${ay-6} 2,${ay+6} 14,${ay}`);
      tri.setAttribute('fill','#6EE7A7');
      svg.appendChild(tri);
      // Ordered marker - small dot
      const oy = h - ordered*scale;
      const dot = document.createElementNS(NS,'circle');
      dot.setAttribute('cx', 8); dot.setAttribute('cy', oy); dot.setAttribute('r', 4);
      dot.setAttribute('fill','#EAB308');
      svg.appendChild(dot);
    }

    function stageColor(stage){ return stage === 'task' ? '#FACC15' : (stage === 'failing' ? '#F59E0B' : '#EF4444'); }
    function stageBg(stage){ return stage === 'task' ? 'rgba(250, 204, 21, 0.1)' : (stage === 'failing' ? 'rgba(245, 158, 11, 0.1)' : 'rgba(239, 68, 68, 0.1)'); }
    function stageLabel(stage){ return stage === 'task' ? 'MAINTENANCE' : (stage === 'failing' ? 'FAILING' : 'FAILED'); }
    function updateDamageLEDs(damage) {
      const hullLed = document.getElementById('hullDamage');
      const floodLed = document.getElementById('flooding');
      
      // Hull damage LED
      if (damage.hull > 0.1) {
        hullLed.className = 'damage-led hull-damage flashing';
        hullLed.title = `Hull Damage: ${(damage.hull * 100).toFixed(0)}%`;
      } else {
        hullLed.className = 'damage-led normal';
        hullLed.title = 'Hull Damage: OK';
      }
      
      // Flooding LED
      if (damage.flooding_rate > 0.5) {
        floodLed.className = 'damage-led flooding flashing';
        floodLed.title = `Flooding Rate: ${damage.flooding_rate.toFixed(1)}`;
      } else {
        floodLed.className = 'damage-led normal';
        floodLed.title = 'Flooding: OK';
      }
    }
    
    // Track existing task elements by ID to avoid recreation
    let existingTaskElements = new Map();
    ws.onmessage = (ev) => { 
        try { 
            const m = JSON.parse(ev.data); 
            if (m.topic === 'telemetry') { 
                const d = m.data; 
                console.log('📡 Received telemetry:', d);
                
                tel.textContent = JSON.stringify(d, null, 2); 
                cav.textContent = 'Cavitation: ' + (d.ownship?.cavitation ? 'YES' : 'NO'); 
                therm.textContent = 'Thermocline: ' + ((d.thermocline ?? true) ? 'ON' : 'OFF'); 
                drawDial(hdgDial, d.ownship.heading, d.ownship.orderedHeading); 
                drawLadder(depthLadder, d.ownship.depth, d.ownship.orderedDepth); 
                drawTele(speedTele, d.ownship.speed, d.ownship.orderedSpeed);
                if (d.ownship && d.ownship.damage) { updateDamageLEDs(d.ownship.damage); } 
                const nz = (d.noise && d.noise.helm_dB) || 0; helmNoise.textContent = nz.toFixed(0); setDbMeter(nz);
                
                                                const tasks = d.tasks || []; 
                console.log('🔧 Processing tasks:', tasks);
                
                // Smart task update: only create new elements for new tasks
                const row = document.getElementById('tasksRow'); 
                
                if (tasks.length === 0) { 
                    // Clear all existing tasks
                    existingTaskElements.clear();
                    row.innerHTML = '';
                    console.log('📝 No active tasks, showing default message');
                    const pill = document.createElement('div'); 
                    pill.className = 'pill'; 
                    pill.textContent = 'No Active Tasks'; 
                    pill.id = 'task';
                    pill.style.color = '#D7E3FF'; 
                    pill.style.borderColor = '#1B2440'; 
                    pill.style.backgroundColor = '#0F162A'; 
                    row.appendChild(pill); 
                } else { 
                    // Remove placeholder if present
                    const placeholder = document.getElementById('task');
                    if (placeholder) {
                        placeholder.parentElement && placeholder.parentElement.removeChild(placeholder);
                    }
                    // Remove any tasks that no longer exist
                    const currentIds = new Set(tasks.map(t => t.id));
                    for (const [tid, el] of Array.from(existingTaskElements.entries())) {
                        if (!currentIds.has(tid)) {
                            if (el && el.parentElement) el.parentElement.removeChild(el);
                            existingTaskElements.delete(tid);
                        }
                    }
                    // Process each task
                    tasks.forEach((task, index) => { 
                        const taskId = task.id;
                        
                        if (existingTaskElements.has(taskId)) {
                            // Update existing task element
                            console.log('🔄 Updating existing task:', taskId);
                            const existingPill = existingTaskElements.get(taskId);
                            
                            // Update only the text content, preserve the button
                            const textSpan = existingPill.querySelector('.task-text');
                            if (textSpan) {
                                textSpan.textContent = `🔧 ${task.title} — ${stageLabel(task.stage)} ${(task.progress*100).toFixed(0)}% — time to complete ${Math.max(0, task.time_remaining_s).toFixed(0)}s${task.started ? ' (REPAIRING)' : ''}`;
                            }
                        } else {
                            // Create new task element
                            console.log('🆕 Creating new task element:', taskId);
                            
                            const pill = document.createElement('div'); 
                            pill.className = 'pill'; 
                            const color = stageColor(task.stage); 
                            const bg = stageBg(task.stage); 
                            pill.style.color = color; 
                            pill.style.borderColor = color; 
                            pill.style.backgroundColor = bg; 
                            
                            const btn = document.createElement('button'); 
                            btn.textContent = 'Repair'; 
                            btn.style.marginLeft = '8px'; 
                            
                            // Add basic click logging to diagnose the issue
                            console.log('🔧 Creating helm repair button for task:', taskId);
                            
                            btn.onclick = () => {
                                console.log('🖱️ BUTTON CLICKED! Repair button clicked for task:', taskId);
                                console.log('🔍 Button element:', btn);
                                console.log('🔍 Button onclick property:', btn.onclick);
                                
                                const cmd = {topic:'station.task.start', data:{station:'helm', task_id: taskId}};
                                console.log('📤 Sending task-specific repair command:', cmd);
                                ws.send(JSON.stringify(cmd));
                                console.log('📤 Task-specific repair command sent');
                            };
                            
                            // Verify the handler was attached
                            console.log('🔍 Button onclick after setup:', btn.onclick);
                            
                            // Create a span for the text content
                            const textSpan = document.createElement('span');
                            textSpan.className = 'task-text';
                            textSpan.textContent = `🔧 ${task.title} — ${stageLabel(task.stage)} ${(task.progress*100).toFixed(0)}% — time to complete ${Math.max(0, task.time_remaining_s).toFixed(0)}s${task.started ? ' (REPAIRING)' : ''}`;
                            
                            pill.appendChild(textSpan);
                            pill.appendChild(btn); 
                            row.appendChild(pill); 
                            
                            // Store the element for future updates
                            existingTaskElements.set(taskId, pill);
                        }
                    }); 
                }
                
                
            } else if (m.topic === 'error') {
                console.error('❌ Server error:', m.error);
            }
        } catch(e) {
            console.error('❌ Error processing message:', e);
        } 
    };



    // Keep simple inputs for ordering
    document.getElementById('send').onclick = () => {
      const heading = parseFloat(document.getElementById('heading').value);
      const speed = parseFloat(document.getElementById('speed').value);
      const depth = parseFloat(document.getElementById('depth').value);
      ws.send(JSON.stringify({topic:'helm.order', data:{heading, speed, depth}}));
    };
    
    
  </script>
</body>
</html>
