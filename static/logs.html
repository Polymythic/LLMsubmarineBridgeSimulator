<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Action Log</title>
  <style>
    body {
      background: #0B1020;
      color: #D7E3FF;
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      margin: 0;
      padding: 0;
    }
    .panel {
      background: #11172B;
      border: 1px solid #1B2440;
      padding: 16px;
      margin: 12px;
      border-radius: 8px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .header h2 { margin: 0; }
    .pill {
      padding: 4px 8px;
      border-radius: 12px;
      background: #0F162A;
      border: 1px solid #1B2440;
      display: inline-block;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .controls button {
      background: #1B2440;
      color: #D7E3FF;
      border: 1px solid #2D3A5C;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .controls button:hover {
      background: #2D3A5C;
    }
    .log-container {
      background: #050814;
      border: 1px solid #1B2440;
      border-radius: 6px;
      height: calc(100vh - 150px);
      overflow-y: auto;
      padding: 12px;
    }
    .log-entry {
      padding: 6px 10px;
      margin: 4px 0;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      gap: 12px;
    }
    .log-entry .timestamp {
      color: #6B7280;
      min-width: 70px;
    }
    .log-entry .station {
      font-weight: bold;
      min-width: 100px;
    }
    .log-entry .message {
      color: #E5E7EB;
    }
    /* Station color coding */
    .station-HELM {
      background: rgba(59, 130, 246, 0.15);
      border-left: 3px solid #3B82F6;
    }
    .station-HELM .station { color: #60A5FA; }

    .station-SONAR {
      background: rgba(34, 197, 94, 0.15);
      border-left: 3px solid #22C55E;
    }
    .station-SONAR .station { color: #4ADE80; }

    .station-WEAPONS {
      background: rgba(239, 68, 68, 0.15);
      border-left: 3px solid #EF4444;
    }
    .station-WEAPONS .station { color: #F87171; }

    .station-ENGINEERING {
      background: rgba(249, 115, 22, 0.15);
      border-left: 3px solid #F97316;
    }
    .station-ENGINEERING .station { color: #FB923C; }

    .empty-state {
      color: #6B7280;
      text-align: center;
      padding: 40px;
      font-style: italic;
    }
    #wsStatus {
      font-size: 12px;
      margin-left: 12px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <h2>
        Submarine Action Log
        <span class="pill" id="wsStatus">Connecting...</span>
      </h2>
      <div class="controls">
        <label>
          <input type="checkbox" id="autoScroll" checked> Auto-scroll
        </label>
        <button id="clearBtn">Clear</button>
      </div>
    </div>
    <div class="log-container" id="logContainer">
      <div class="empty-state" id="emptyState">Waiting for actions...</div>
    </div>
  </div>

  <script>
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/logs');
    const wsStatus = document.getElementById('wsStatus');
    const logContainer = document.getElementById('logContainer');
    const emptyState = document.getElementById('emptyState');
    const autoScrollCheckbox = document.getElementById('autoScroll');
    const clearBtn = document.getElementById('clearBtn');

    // Keep track of all entries
    let entries = [];

    ws.onopen = () => {
      wsStatus.textContent = 'Connected';
      wsStatus.style.color = '#8DEB8D';
      wsStatus.style.borderColor = '#8DEB8D';
    };

    ws.onclose = () => {
      wsStatus.textContent = 'Disconnected';
      wsStatus.style.color = '#FF6B6B';
      wsStatus.style.borderColor = '#FF6B6B';
    };

    ws.onerror = () => {
      wsStatus.textContent = 'Error';
      wsStatus.style.color = '#FF6B6B';
      wsStatus.style.borderColor = '#FF6B6B';
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.topic === 'telemetry' && msg.data && msg.data.actions) {
          const actions = msg.data.actions;
          if (actions.length > 0) {
            actions.forEach(action => addLogEntry(action));
          }
        }
      } catch (e) {
        console.error('Error parsing message:', e);
      }
    };

    function formatTime(isoString) {
      if (!isoString) return '--:--:--';
      try {
        const d = new Date(isoString);
        return d.toLocaleTimeString('en-US', { hour12: false });
      } catch (e) {
        return '--:--:--';
      }
    }

    function addLogEntry(action) {
      // Hide empty state
      if (emptyState) {
        emptyState.style.display = 'none';
      }

      const station = action.station || 'SYSTEM';
      const message = action.message || '';
      const timestamp = formatTime(action.at);

      // Create entry element
      const entry = document.createElement('div');
      entry.className = `log-entry station-${station}`;
      entry.innerHTML = `
        <span class="timestamp">${timestamp}</span>
        <span class="station">${station}</span>
        <span class="message">${escapeHtml(message)}</span>
      `;

      // Add to container (newest at bottom)
      logContainer.appendChild(entry);
      entries.push(entry);

      // Limit entries to prevent memory issues
      if (entries.length > 500) {
        const removed = entries.shift();
        removed.remove();
      }

      // Auto-scroll if enabled
      if (autoScrollCheckbox.checked) {
        logContainer.scrollTop = logContainer.scrollHeight;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Clear button handler
    clearBtn.addEventListener('click', () => {
      entries.forEach(e => e.remove());
      entries = [];
      emptyState.style.display = 'block';
    });
  </script>
</body>
</html>
